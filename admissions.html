<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<section class="page-hero" style="background-image:url('assets/IMG_5616.jpg')">

    <h1 data-i18n="adm.h1">Admissions</h1>
    <p data-i18n="adm.heroSub">We're excited to welcome your family to our school community.</p>
