<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="gal.metaTitle">Gallery — American Prime International School</title>
<meta name="description" content="Moments from classrooms, library, fields and adventures at APIS Khon Kaen.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&family=Noto+Serif+Thai:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/logo-crest.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header id="hdr"></header>

<section class="page-hero" style="background-image:url('assets/IMG_5537.jpg')">
  <div class="ph-in reveal">
    <span class="eyebrow" data-i18n="nav.gallery">Gallery</span>
    <h1 data-i18n="gal.h1">Gallery</h1>
    <p data-i18n="gal.heroSub">Moments from our classrooms, library, fields and adventures.</p>
  </div>
</section>

<section class="block">
  <span class="orb orb-b" aria-hidden="true"></span>
  <div class="wrap">
    <div class="gal-filter" id="galFilter">
      <button class="gal-tab active" data-filter="all" data-i18n="gal.fAll">All</button>
      <button class="gal-tab" data-filter="uniform" data-i18n="gal.fUniform">Uniform</button>
      <button class="gal-tab" data-filter="activities" data-i18n="gal.fActivities">Activities</button>
      <button class="gal-tab" data-filter="classroom" data-i18n="gal.fClassroom">Classroom</button>
      <button class="gal-tab" data-filter="music" data-i18n="gal.fMusic">Music</button>
      <button class="gal-tab" data-filter="sport" data-i18n="gal.fSport">Sport</button>
    </div>
    <div class="gal-grid gal-grid-dyn" id="galGridDyn"></div>
  </div>
</section>

<!-- Lightbox (marco ornamental estilo Hogwarts) -->
<div class="lightbox" id="lightbox" hidden>
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">‹</button>
  <div class="lb-stage">
    <div class="lb-frame"><img id="lbImg" src="" alt=""></div>
    <div class="lb-count" id="lbCount"></div>
  </div>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Next">›</button>
</div>

<footer id="ftr"></footer>
<script src="js/content.js"></script><script src="js/gallery-data.js"></script><script src="js/layout.js"></script><script src="js/i18n.js"></script><script src="js/main.js"></script>
</body>
</html>
